<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas Praktikum - ST Bhinneka</title>
</head>
<body>

    <a href="https://satyaterrabhinneka.ac.id/" target="_blank">
        <img src="https://satyaterrabhinneka.ac.id/assets/img/logo-universitas-satya-terra-bhinneka.png" alt="Logo ST Bhinneka" style="height:80px;">
    </a>

    <hr>

    <h3>Menu Navigasi</h3>
    <ul>
        <li><a href="index.html">Beranda</a></li>
        <li><a href="https://satyaterrabhinneka.ac.id/tentang-kami" target="_blank">Tentang Kami</a></li>
        <li><a href="https://satyaterrabhinneka.ac.id/kontak" target="_blank">Hubungi Kami</a></li>
    </ul>

    <hr>

    <h3>Formulir Pengguna</h3>
    <form action="#" method="POST" enctype="multipart/form-data">
        <table cellpadding="5">
            <tr>
                <td><label for="nama">Nama</label></td>
                <td>:</td>
                <td><input type="text" id="nama" name="nama" placeholder="Masukkan nama lengkap"></td>
            </tr>
            
            <tr>
                <td><label for="email">Email</label></td>
                <td>:</td>
                <td><input type="email" id="email" name="email" placeholder="example@mail.com"></td>
            </tr>

            <tr>
                <td>Jenis Kelamin</td>
                <td>:</td>
                <td>
                    <input type="radio" id="pria" name="gender" value="Laki-laki">
                    <label presidential for="pria">Laki-laki</label>
                    
                    <input type="radio" id="wanita" name="gender" value="Perempuan">
                    <label for="wanita">Perempuan</label>
                </td>
            </tr>

            <tr>
                <td><label for="usia">Usia</label></td>
                <td>:</td>
                <td><input type="number" id="usia" name="usia" min="1"></td>
            </tr>

            <tr>
                <td><label for="password">Password</label></td>
                <td>:</td>
                <td><input type="password" id="password" name="password" minlength="8"></td>
            </tr>

            <tr>
                <td><label for="alamat">Alamat</label></td>
                <td>:</td>
                <td>
                    <textarea id="alamat" name="alamat" rows="3" cols="30" placeholder="Masukkan alamat lengkap"></textarea>
                </td>
            </tr>

            <tr>
                <td><label for="gambar">Pilih Gambar</label></td>
                <td>:</td>
                <td><input type="file" id="gambar" name="gambar" accept="image/*"></td>
            </tr>

            <tr>
                <td>Hobi</td>
                <td>:</td>
                <td>
                    <input type="checkbox" id="olahraga" name="hobi" value="Olahraga">
                    <label for="olahraga">Olahraga</label>
                    
                    <input type="checkbox" id="musik" name="hobi" value="Musik">
                    <label for="musik">Musik</label>
                    
                    <input type="checkbox" id="membaca" name="hobi" value="Membaca">
                    <label for="membaca">Membaca</label>
                </td>
            </tr>

            <tr>
                <td><label for="tanggal_lahir">Tanggal Lahir</label></td>
                <td>:</td>
                <td><input type="date" id="tanggal_lahir" name="tanggal_lahir"></td>
            </tr>

            <tr>
                <td></td>
                <td></td>
                <td>
                    <input type="submit" value="Submit">
                </td>
            </tr>
        </table>
    </form>

</body>
</html>
